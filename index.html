<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Licznik Pieniędzy</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 50px;
            background-color: #f4f4f4;
            color: #333;
        }
        .container {
            background-color: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            text-align: center;
            width: 90%;
            max-width: 400px;
        }
        .tabs {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
            border-bottom: 2px solid #eee;
        }
        .tab-button {
            padding: 10px 20px;
            cursor: pointer;
            background: none;
            border: none;
            font-size: 1.1em;
            color: #666;
            transition: color 0.3s, border-bottom 0.3s;
        }
        .tab-button.active {
            color: #007bff;
            border-bottom: 3px solid #007bff;
            font-weight: bold;
        }
        h1 {
            color: #0056b3;
            margin-bottom: 20px;
        }
        #total-display {
            font-size: 2.5em;
            font-weight: bold;
            margin-bottom: 30px;
            color: #28a745;
        }
        #add-entry-button {
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            font-size: 2em;
            cursor: pointer;
            margin-bottom: 20px;
            transition: background-color 0.3s, transform 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-left: auto;
            margin-right: auto;
        }
        #add-entry-button:hover { background-color: #0056b3; }
        #add-entry-button:active { transform: scale(0.95); }
        .entry-row {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
            justify-content: center;
        }
        input[type="number"] {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 1em;
            flex-grow: 1; /* Allow inputs to grow */
        }
        .add-amount-button {
            padding: 10px 15px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        .add-amount-button:disabled {
            background-color: #ccc;
            cursor: default;
        }
        .history-list {
            text-align: left;
            list-style: none;
            padding: 0;
            max-height: 300px;
            overflow-y: auto;
        }
        .history-item {
            padding: 10px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .history-actions {
            display: flex;
            gap: 5px;
        }
        .btn-small {
            padding: 5px 10px;
            font-size: 0.8em;
        }

        .selection-menu {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 300px;
        }

        .set-option {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .set-option:hover {
            transform: scale(1.1);
        }
        .circle-btn {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background-color: #007bff;
            color: white;
            border: none;
            font-size: 3em;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0, 123, 255, 0.3);
            cursor: pointer;
        }
        .set-label {
            margin-top: 12px;
            font-weight: bold;
            color: #555;
            font-size: 1.1em;
        }

        /* Animation for new rows */
        .entry-row {
            display: flex;
            flex-direction: column; /* Changed to column for better stacking of inputs */
            gap: 8px; /* Smaller gap for vertical stacking */
            margin-bottom: 12px;
            align-items: center; /* Center items horizontally */
            max-height: 0; /* Initial state for animation */
            opacity: 0; /* Initial state for animation */
            overflow: hidden;
            transition: max-height 0.5s ease-out, opacity 0.5s ease-out;
        }
        .entry-row.show {
            max-height: 150px; /* Sufficient height for all elements in the row */
            opacity: 1;
        }

        .entry-row .input-group { /* Group inputs and buttons horizontally */
            display: flex;
            gap: 10px;
            justify-content: center;
            width: 100%; /* Take full width of parent column */
            flex-wrap: wrap; /* Allow wrapping if too wide */
        }

        .entry-row input[type="date"],
        .entry-row input[type="text"] {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 1em;
            flex-grow: 1; /* Allow inputs to grow */
            min-width: 100px; /* Minimum width for inputs */
            max-width: 150px; /* Max width for inputs */
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Licznik Pieniędzy</h1>
        
        <!-- Menu wyboru - znika po kliknięciu -->
        <div id="view-selection" class="selection-menu">
            <div class="set-option" onclick="openApp('Komputer')">
                <button class="circle-btn">💻</button>
                <span class="set-label">Komputer</span>
            </div>
        </div>

        <!-- Główna zawartość - pojawia się po kliknięciu -->
        <div id="app-content" class="hidden">
            <h2 id="current-set-title" style="color: #666; margin-bottom: 20px;"></h2>
            
            <div class="tabs">
                <button class="tab-button active" onclick="showTab('start')">Start</button>
                <button class="tab-button" onclick="showTab('history')">Historia</button>
            </div>

            <div id="view-start"> <!-- Domyślnie widoczna -->
                <button id="add-entry-button" title="Dodaj nową kwotę">+</button>
                <div id="total-display">Suma: 0.00 zł</div>
                <div id="entry-fields-container"></div>
            </div>

            <div id="view-history" class="hidden"> <!-- Domyślnie ukryta -->
                <h3>Historia wpisów</h3>
                <ul id="history-list" class="history-list"></ul>
            </div>
        </div>
    </div>

    <script>
        let totalAmount = 0;
        const totalDisplay = document.getElementById('total-display');
        const addEntryButton = document.getElementById('add-entry-button');
        const entryFieldsContainer = document.getElementById('entry-fields-container');
        const historyList = document.getElementById('history-list');

        // Wczytywanie i migracja danych (obsługa starego formatu danych)
        let raw = JSON.parse(localStorage.getItem('moneyEntries') || '[]');
        let savedEntries = raw.map(e => typeof e === 'object' ? e : { id: Date.now() + Math.random(), val: e });
        localStorage.setItem('moneyEntries', JSON.stringify(savedEntries));

        function updateTotal() {
            totalDisplay.textContent = `Suma: ${totalAmount.toFixed(2)} zł`;
        }

        // Funkcja otwierająca konkretny zestaw
        window.openApp = (setName) => {
            // Ukrywamy menu wyboru
            document.getElementById('view-selection').classList.add('hidden');
            // Pokazujemy aplikację
            document.getElementById('app-content').classList.remove('hidden');
            // Ustawiamy tytuł zestawu
            document.getElementById('current-set-title').textContent = "Zestaw: " + setName;
            
            showTab('start'); // Domyślnie otwieramy zakładkę 'Start'
        };

        function saveToStorage() {
            localStorage.setItem('moneyEntries', JSON.stringify(savedEntries));
        }

        function showTab(tabName) {
            // Dezaktywuj wszystkie przyciski zakładek
            document.querySelectorAll('.tab-button').forEach(btn => {
                btn.classList.remove('active');
            });

            // Aktywuj kliknięty przycisk zakładki
            document.querySelector(`.tab-button[onclick="showTab('${tabName}')"]`).classList.add('active');

            // Ukryj wszystkie widoki
            document.getElementById('view-start').classList.add('hidden');
            document.getElementById('view-history').classList.add('hidden');

            // Pokaż wybrany widok
            document.getElementById(`view-${tabName}`).classList.remove('hidden');

            if (tabName === 'history') {
                renderHistory(); // Odśwież historię tylko, gdy przechodzimy do zakładki historii
            }
        }

        function renderHistory() {
            historyList.innerHTML = savedEntries.length === 0 ? '<li>Brak wpisów</li>' : '';
            savedEntries.slice().reverse().forEach((entry, index) => {
                const originalIndex = savedEntries.length - 1 - index;
                const li = document.createElement('li');
                li.className = 'history-item';
                li.innerHTML = `
                    <span><strong>${entry.val.toFixed(2)} zł</strong></span>
                    <div class="history-actions">
                        <button class="add-amount-button btn-small" style="background-color: #ffc107" onclick="editEntry(${originalIndex})">Edytuj</button>
                        <button class="add-amount-button btn-small" style="background-color: #dc3545" onclick="deleteEntry(${originalIndex})">Usuń</button>
                    </div>
                `;
                historyList.appendChild(li);
            });
        }

        window.deleteEntry = (index) => {
            const entry = savedEntries[index];
            // Znajdź wiersz w DOM, aby go animować
            const row = entryFieldsContainer.querySelector(`.entry-row[data-id="${entry.id}"]`);
            
            const performDelete = () => {
                totalAmount -= entry.val;
                savedEntries.splice(index, 1);
                saveToStorage();
                updateTotal();
                renderHistory();
                if (row) row.remove();
                else refreshStartView();
            };

            if (row) animateRowOut(row, performDelete);
            else performDelete();
        };

        window.editEntry = (index) => {
            const entry = savedEntries[index];
            const newAmount = prompt("Podaj nową kwotę:", entry.val);
            const newDate = prompt("Podaj nową datę (YYYY-MM-DD):", entry.date);
            const newSource = prompt("Podaj nowe źródło (opcjonalnie):", entry.source);

            const parsedAmount = parseFloat(newAmount);
            if (!isNaN(parsedAmount) && newDate) {
                totalAmount = totalAmount - entry.val + parsedAmount;
                entry.val = parsedAmount;
                entry.date = newDate;
                entry.source = newSource;
                saveToStorage();
                updateTotal();
                renderHistory();
                refreshStartView();
            }
        };

        // Pomocnicza funkcja do gładkiego usuwania wiersza
        function animateRowOut(rowElement, callback) {
            rowElement.classList.remove('show');
            rowElement.addEventListener('transitionend', () => {
                if (callback) callback();
            }, { once: true });
        }

        function refreshStartView() {
            entryFieldsContainer.innerHTML = '';
            addEntryButton.classList.remove('hidden'); // Upewnij się, że przycisk + jest widoczny
            savedEntries.forEach(entry => createRow(entry, true)); // Pass the whole entry object
        }

        function createRow(initialEntry = null, isLocked = false) { // initialEntry is an object {val, date, source, id}
            const row = document.createElement('div');
            row.className = 'entry-row';
            if (initialEntry && initialEntry.id) row.dataset.id = initialEntry.id;

            const inputGroup = document.createElement('div');
            inputGroup.className = 'input-group';

            const amountInput = document.createElement('input');
            amountInput.type = 'number';
            amountInput.step = '0.01';
            amountInput.placeholder = 'Kwota';
            amountInput.inputMode = 'decimal'; // Klawiatura numeryczna z kropką/przecinkiem

            const dateInput = document.createElement('input');
            dateInput.type = 'date';
            dateInput.inputMode = 'numeric'; // Klawiatura numeryczna dla daty
            dateInput.valueAsDate = new Date(); // Default to today
            
            const sourceInput = document.createElement('input');
            sourceInput.type = 'text';
            sourceInput.placeholder = 'Źródło (opcjonalnie)';

            const btn = document.createElement('button');
            btn.className = 'add-amount-button';
            btn.textContent = 'Dodaj';
            let currentVal = initialEntry ? initialEntry.val : 0;

            // Jeśli wczytujemy dane, blokujemy pole od razu
            if (isLocked) {
                amountInput.value = initialEntry.val;
                dateInput.value = initialEntry.date || new Date().toISOString().split('T')[0];
                sourceInput.value = initialEntry.source || '';
                
                amountInput.disabled = true;
                dateInput.disabled = true;
                sourceInput.disabled = true;
                btn.textContent = 'Edytuj';
                btn.style.backgroundColor = '#ffc107';
            }

            const delBtn = document.createElement('button');
            delBtn.className = 'add-amount-button';
            delBtn.textContent = '🗑️';
            delBtn.style.backgroundColor = '#dc3545';
            delBtn.onclick = () => {
                if (isLocked) {
                    const idx = savedEntries.findIndex(e => e.id === (initialEntry ? initialEntry.id : null));
                    if (idx > -1) deleteEntry(idx);
                } else {
                    animateRowOut(row, () => { row.remove(); });
                }
            };

            let currentId = initialEntry ? initialEntry.id : null;

            const submit = () => {
                if (btn.textContent === 'Edytuj') {
                    // Usunięto ukrywanie przycisku +, aby był zawsze widoczny
                    // addEntryButton.classList.add('hidden'); 
                    amountInput.disabled = false;
                    dateInput.disabled = false;
                    sourceInput.disabled = false;
                    btn.textContent = 'OK';
                    btn.style.backgroundColor = '#28a745';
                    totalAmount -= currentVal;
                    const idx = savedEntries.findIndex(e => e.id === currentId);
                    if (idx > -1) savedEntries.splice(idx, 1);
                    updateTotal();
                    amountInput.focus();
                    return;
                }

                const val = parseFloat(amountInput.value);
                const date = dateInput.value;
                const source = sourceInput.value.trim();

                if (!isNaN(val) && val !== 0 && date) {
                    totalAmount += val;
                    currentVal = val;
                    row.dataset.id = currentId || Date.now() + Math.random();
                    updateTotal();
                    amountInput.disabled = true;
                    dateInput.disabled = true;
                    sourceInput.disabled = true;
                    btn.textContent = 'Edytuj';
                    btn.style.backgroundColor = '#ffc107';
                    isLocked = true;

                    const newId = row.dataset.id;
                    currentId = newId;
                    savedEntries.push({ id: newId, val: val, date: date, source: source });
                    saveToStorage();
                    // Usunięto pokazywanie przycisku +, ponieważ jest zawsze widoczny
                    if (!document.getElementById('view-history').classList.contains('hidden')) renderHistory();
                }
                else {
                    alert('Proszę wprowadzić prawidłową kwotę i datę.');
                }
            };

            btn.addEventListener('click', submit);
            amountInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') submit(); });
            dateInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') submit(); });
            sourceInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') submit(); });


            inputGroup.appendChild(amountInput);
            inputGroup.appendChild(dateInput);
            inputGroup.appendChild(sourceInput);
            inputGroup.appendChild(btn);
            inputGroup.appendChild(delBtn);
            
            row.appendChild(inputGroup); // Append the input group to the row

            entryFieldsContainer.prepend(row);

            // Animation for new rows
            if (!isLocked) {
                // Use a small timeout to allow the browser to render the initial state (max-height: 0)
                setTimeout(() => {
                    row.classList.add('show');
                }, 10);
                amountInput.focus();
            }
        }

        // Inicjalizacja: dodaj zapisane wpisy do widoku i oblicz sumę
        savedEntries.forEach(entry => {
            totalAmount += entry.val;
            createRow(entry, true);
        });
        updateTotal();

        addEntryButton.addEventListener('click', () => {
            const activeInput = entryFieldsContainer.querySelector('.entry-row input:not(:disabled)');
            
            if (activeInput) {
                const activeRow = activeInput.closest('.entry-row');
                // Jeśli to nowy wiersz (nie ma jeszcze ID w bazie), kliknięcie + go usuwa (chowa dodawanie)
                if (!activeRow.dataset.id) {
                    animateRowOut(activeRow, () => { activeRow.remove(); });
                } else {
                    // Jeśli edytujemy stary wiersz, tylko ustawiamy na nim focus
                    activeInput.focus();
                }
                return;
            }
            createRow();
        });
    </script>
</body>
</html>
