<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Licznik Pieniędzy</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 50px;
            background-color: #f4f4f4;
            color: #333;
        }
        .container {
            background-color: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            text-align: center;
            width: 90%;
            max-width: 400px;
        }
        .tabs {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
            border-bottom: 2px solid #eee;
        }
        .tab-button {
            padding: 10px 20px;
            cursor: pointer;
            background: none;
            border: none;
            font-size: 1.1em;
            color: #666;
            transition: color 0.3s, border-bottom 0.3s;
        }
        .tab-button.active {
            color: #007bff;
            border-bottom: 3px solid #007bff;
            font-weight: bold;
        }
        h1 {
            color: #0056b3;
            margin-bottom: 20px;
        }
        #total-display {
            font-size: 2.5em;
            font-weight: bold;
            margin-bottom: 30px;
            color: #28a745;
        }
        #add-entry-button {
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            font-size: 2em;
            cursor: pointer;
            margin-bottom: 20px;
            transition: background-color 0.3s, transform 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-left: auto;
            margin-right: auto;
        }
        #add-entry-button:hover { background-color: #0056b3; }
        #add-entry-button:active { transform: scale(0.95); }
        .entry-row {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
            justify-content: center;
        }
        input[type="number"] {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 1em;
            width: 140px;
        }
        .add-amount-button {
            padding: 10px 15px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        .add-amount-button:disabled {
            background-color: #ccc;
            cursor: default;
        }
        .history-list {
            text-align: left;
            list-style: none;
            padding: 0;
            max-height: 300px;
            overflow-y: auto;
        }
        .history-item {
            padding: 10px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
        }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Licznik Pieniędzy</h1>
        
        <div class="tabs">
            <button class="tab-button active" onclick="showTab('start')">Start</button>
            <button class="tab-button" onclick="showTab('history')">Historia</button>
        </div>

        <div id="view-start">
            <button id="add-entry-button" title="Dodaj nową kwotę">+</button>
            <div id="total-display">Suma: 0.00 zł</div>
            <div id="entry-fields-container"></div>
        </div>

        <div id="view-history" class="hidden">
            <h3>Historia wpisów</h3>
            <ul id="history-list" class="history-list"></ul>
        </div>
    </div>

    <script>
        let totalAmount = 0;
        const totalDisplay = document.getElementById('total-display');
        const addEntryButton = document.getElementById('add-entry-button');
        const entryFieldsContainer = document.getElementById('entry-fields-container');
        const historyList = document.getElementById('history-list');

        // Wczytywanie zapisanych danych z localStorage na starcie
        const savedEntries = JSON.parse(localStorage.getItem('moneyEntries') || '[]');

        function updateTotal() {
            totalDisplay.textContent = `Suma: ${totalAmount.toFixed(2)} zł`;
        }

        function showTab(tabName) {
            document.getElementById('view-start').classList.toggle('hidden', tabName !== 'start');
            document.getElementById('view-history').classList.toggle('hidden', tabName !== 'history');
            
            document.querySelectorAll('.tab-button').forEach(btn => {
                btn.classList.toggle('active', btn.textContent.toLowerCase().includes(tabName));
            });
            
            if (tabName === 'history') renderHistory();
        }

        function renderHistory() {
            const entries = JSON.parse(localStorage.getItem('moneyEntries') || '[]');
            historyList.innerHTML = entries.length === 0 ? '<li>Brak wpisów</li>' : '';
            entries.slice().reverse().forEach((val, index) => {
                const li = document.createElement('li');
                li.className = 'history-item';
                li.innerHTML = `<span>Wpis #${entries.length - index}</span> <strong>${val.toFixed(2)} zł</strong>`;
                historyList.appendChild(li);
            });
        }

        function createRow(initialValue = null, isLocked = false) {
            const row = document.createElement('div');
            row.className = 'entry-row';

            const input = document.createElement('input');
            input.type = 'number';
            input.step = '0.01';
            input.placeholder = '0.00';

            const btn = document.createElement('button');
            btn.className = 'add-amount-button';
            btn.textContent = 'Dodaj';

            // Jeśli wczytujemy dane, blokujemy pole od razu
            if (isLocked) {
                input.value = initialValue;
                input.disabled = true;
                btn.disabled = true;
                btn.textContent = '✓';
            }

            const submit = () => {
                const val = parseFloat(input.value);
                if (!isNaN(val) && val !== 0) {
                    totalAmount += val;
                    updateTotal();
                    input.disabled = true;
                    btn.disabled = true;
                    btn.textContent = '✓';

                    // Zapisywanie do localStorage
                    const currentEntries = JSON.parse(localStorage.getItem('moneyEntries') || '[]');
                    currentEntries.push(val);
                    localStorage.setItem('moneyEntries', JSON.stringify(currentEntries));
                    if (!document.getElementById('view-history').classList.contains('hidden')) renderHistory();
                }
            };

            btn.addEventListener('click', submit);
            input.addEventListener('keypress', (e) => { if (e.key === 'Enter') submit(); });

            row.appendChild(input);
            row.appendChild(btn);
            entryFieldsContainer.prepend(row);
            if (!isLocked) input.focus();
        }

        // Inicjalizacja: dodaj zapisane wpisy do widoku i oblicz sumę
        savedEntries.forEach(val => {
            totalAmount += val;
            createRow(val, true);
        });
        updateTotal();

        addEntryButton.addEventListener('click', () => {
            createRow();
        });
    </script>
</body>
</html>
